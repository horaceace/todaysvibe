<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Today's Vibe</title>
  <meta name="description" content="Your daily poster. One reveal. A new vibe every day.">

  <meta property="og:title" content="Today's Vibe">
  <meta property="og:description" content="Your daily poster. One reveal. A new vibe every day.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://todaysvibe.cc">
  <meta property="og:image" content="https://todaysvibe.cc/preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Today's Vibe">
  <meta name="twitter:description" content="Your daily poster. One reveal. A new vibe every day.">
  <meta name="twitter:image" content="https://todaysvibe.cc/preview.png">

  <link rel="canonical" href="https://todaysvibe.cc">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">

  <meta name="theme-color" content="#f4f1ea">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Today's Vibe",
    "url": "https://todaysvibe.cc",
    "description": "Daily vibe poster — one reveal, a new energy every day.",
    "applicationCategory": "LifestyleApplication",
    "operatingSystem": "Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>

  <link rel="stylesheet" href="style.css">
  <script src="data.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="wash" id="wash" aria-hidden="true"></div>

  <main id="app">

    <!-- Cover: unrevealed -->
    <section id="cover" class="stage stage--cover" aria-label="Reveal today's vibe">
      <p class="date-line" id="cover-date"></p>
      <div class="rule" aria-hidden="true"></div>
      <h1 class="cover-title">
        <span>what's your</span>
        <span>vibe today?</span>
      </h1>
      <button type="button" id="reveal-btn" class="reveal-btn">Reveal</button>
      <p class="cover-hint">once a day</p>
    </section>

    <!-- Poster: revealed -->
    <section id="poster" class="stage stage--poster hidden" aria-label="Today's vibe poster">
      <p class="date-line" id="poster-date"></p>

      <div class="poster-mark" id="poster-emoji" aria-hidden="true"></div>

      <h2 class="poster-name" id="poster-name"></h2>
      <p class="poster-desc" id="poster-desc"></p>

      <div class="rule rule--wide" aria-hidden="true"></div>

      <div class="stats" id="stats" role="list" aria-label="Daily dimensions"></div>

      <div class="rule rule--wide" aria-hidden="true"></div>

      <div class="lucky" id="lucky">
        <span class="lucky-swatch" id="lucky-swatch" aria-hidden="true"></span>
        <span class="lucky-label">lucky</span>
        <span class="lucky-number" id="lucky-number"></span>
      </div>

      <button type="button" id="share-btn" class="share-btn">Share</button>

      <section class="history" id="history" hidden>
        <h3 class="history-label">Recent</h3>
        <ul class="history-list" id="history-list"></ul>
      </section>

      <p class="footer-line">A new vibe every day. Come back tomorrow.</p>
    </section>

  </main>
</body>
</html>
