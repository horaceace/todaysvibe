<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Today's Vibe</title>
  <meta name="description" content="One drop a day. Reveal your color.">

  <meta property="og:title" content="Today's Vibe">
  <meta property="og:description" content="One drop a day. Reveal your color.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://todaysvibe.today">
  <meta property="og:image" content="https://todaysvibe.today/preview.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Today's Vibe">
  <meta name="twitter:description" content="One drop a day. Reveal your color.">
  <meta name="twitter:image" content="https://todaysvibe.today/preview.png">

  <link rel="canonical" href="https://todaysvibe.today">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>●</text></svg>">
  <meta name="theme-color" content="#0a0a0a" id="theme-meta">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=7">
  <script src="data.js?v=7" defer></script>
  <script src="app.js?v=7" defer></script>
</head>
<body>
  <!-- Full-bleed stage color (black → lucky) -->
  <div class="field" id="field" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>

  <main id="app">

    <!-- COVER: dark void + massive type -->
    <section id="cover" class="stage stage--cover">
      <p class="meta-top" id="cover-date"></p>

      <div class="cover-stack">
        <p class="cover-watermark" aria-hidden="true">VIBE</p>
        <h1 class="cover-title">
          <span class="cover-title__line">what’s</span>
          <span class="cover-title__line cover-title__line--accent">yours</span>
          <span class="cover-title__line">today?</span>
        </h1>
      </div>

      <div class="cover-foot">
        <button type="button" id="reveal-btn" class="drop-btn">
          <span class="drop-btn__dot" aria-hidden="true"></span>
          <span>Drop today</span>
        </button>
        <p class="cover-note">one color · one word · one day</p>
      </div>
    </section>

    <!-- DROP: full lucky-color immersion -->
    <section id="drop" class="stage stage--drop hidden" aria-live="polite">
      <header class="drop-top">
        <p class="meta-top" id="drop-date"></p>
        <p class="drop-brand">Today’s Vibe</p>
      </header>

      <div class="drop-hero">
        <span class="drop-emoji" id="drop-emoji"></span>
        <h2 class="drop-name" id="drop-name"></h2>
        <p class="drop-desc" id="drop-desc"></p>
      </div>

      <div class="scoreboard" id="scoreboard" role="list"></div>

      <div class="drop-stamp">
        <span class="drop-stamp__label">No.</span>
        <span class="drop-stamp__num" id="drop-number"></span>
        <span class="drop-stamp__hex" id="drop-hex"></span>
      </div>

      <footer class="drop-foot">
        <button type="button" id="share-btn" class="share-btn">Share this drop</button>
        <ul class="history" id="history" hidden></ul>
        <p class="drop-next">Next drop tomorrow</p>
      </footer>
    </section>

  </main>

  <!-- Cloudflare Web Analytics -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "4d14f28af92c4fbaa88e27be688c01ef"}'></script>
  <!-- End Cloudflare Web Analytics -->
</body>
</html>
